<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster Pro - Contato</title>
    <link rel="stylesheet" href="../CSS/contato.css">
</head>
<body>

    <form id="form-contato">
        <h2>Fale Conosco</h2>

        <label for="nome"><b>Nome</b></label>
        <input id="nome" name="nome" type="text" placeholder="Seu nome completo" required>

        <label for="email"><b>Email</b></label>
        <input id="email" name="email" type="email" placeholder="seu@email.com" required>

        <label for="assunto"><b>Assunto</b></label>
        <select id="assunto" name="assunto" required>
            <option value="" disabled selected>Selecione uma opção</option>
            <option value="duvida">Dúvida</option>
            <option value="suporte">Suporte</option>
            <option value="outro">Outro</option>
        </select>

        <label for="mensagem"><b>Mensagem</b></label>
        <input id="mensagem" name="mensagem" type="mensagem" placeholder="Como podemos te ajudar?" required>

        <button type="submit"><b>Enviar Feedback</b></button>
    </form>

</body>
</html>
